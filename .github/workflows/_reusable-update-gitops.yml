name: Reusable — Update GitOps Image Tag

# Called by individual service CI workflows after a successful image push.
# Avoids duplicating the gitops update logic across every workflow file.
on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name (must match the values filename, e.g. api-gateway)"
        required: true
        type: string
      ecr-repository:
        description: "ECR repository name"
        required: true
        type: string
      image-tag:
        description: "Docker image tag (git SHA)"
        required: true
        type: string
      gitops-repo:
        description: "GitOps repository in owner/repo format"
        required: true
        type: string
      aws-region:
        description: "AWS region where ECR lives"
        required: true
        type: string
    secrets:
      GITOPS_TOKEN:
        description: "GitHub PAT or App token with write access to the gitops repo"
        required: true
      AWS_ACCOUNT_ID:
        description: "AWS account ID (12 digits)"
        required: true

jobs:
  update-gitops:
    name: Update GitOps (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    steps:
      - name: Determine target environment
        id: target
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Checkout GitOps repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.gitops-repo }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: zen-gitops

      - name: Update image tag in Helm values
        run: |
          ENVIRONMENT=${{ steps.target.outputs.environment }}
          VALUES_FILE="zen-gitops/envs/${ENVIRONMENT}/values-${{ inputs.service-name }}.yaml"

          if [[ ! -f "${VALUES_FILE}" ]]; then
            echo "ERROR: Values file not found: ${VALUES_FILE}"
            exit 1
          fi

          # Update only the tag line inside the image block
          sed -i "s/^  tag:.*/  tag: ${{ inputs.image-tag }}/" "${VALUES_FILE}"
          echo "Updated ${VALUES_FILE} → tag: ${{ inputs.image-tag }}"

      - name: Commit and push
        run: |
          cd zen-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit — image tag was already up to date"
          else
            git commit -m "ci: update ${{ inputs.service-name }} image to ${{ inputs.image-tag }}

          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Environment: ${{ steps.target.outputs.environment }}"
            git push
          fi
