name: Drug Catalog Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'drug-catalog-service/**'
      - '.github/workflows/drug-catalog-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'drug-catalog-service/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: drug-catalog-service
  IMAGE_TAG: ${{ github.sha }}
  GITOPS_REPO: ravdy/zen-gitops
  SERVICE_DIR: drug-catalog-service

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Checkstyle
        run: cd ${{ env.SERVICE_DIR }} && mvn checkstyle:check --no-transfer-progress

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests with JaCoCo coverage
        run: cd ${{ env.SERVICE_DIR }} && mvn test jacoco:report --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-catalog
          path: ${{ env.SERVICE_DIR }}/target/site/jacoco/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build JAR
        run: cd ${{ env.SERVICE_DIR }} && mvn package -DskipTests --no-transfer-progress
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: catalog-jar
          path: ${{ env.SERVICE_DIR }}/target/*.jar

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: catalog-jar
          path: ${{ env.SERVICE_DIR }}/target/
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pharma-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build Docker image
        run: |
          cd ${{ env.SERVICE_DIR }}
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest .
      - name: Push image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  update-gitops:
    name: Update GitOps
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_reusable-update-gitops.yml
    with:
      service-name: catalog-service
      ecr-repository: ${{ env.ECR_REPOSITORY }}
      image-tag: ${{ env.IMAGE_TAG }}
      gitops-repo: ${{ env.GITOPS_REPO }}
      aws-region: ${{ env.AWS_REGION }}
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
