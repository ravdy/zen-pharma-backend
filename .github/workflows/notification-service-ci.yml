name: Notification Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'notification-service/**'
      - '.github/workflows/notification-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'notification-service/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: notification-service
  IMAGE_TAG: ${{ github.sha }}
  GITOPS_REPO: ravdy/zen-gitops
  SERVICE_DIR: notification-service

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_DIR }}/package-lock.json
      - name: Install dependencies
        run: cd ${{ env.SERVICE_DIR }} && npm ci
      - name: ESLint
        run: cd ${{ env.SERVICE_DIR }} && npx eslint src/ --ext .js --max-warnings 0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_DIR }}/package-lock.json
      - name: Install dependencies
        run: cd ${{ env.SERVICE_DIR }} && npm ci
      - name: Run tests with coverage
        run: cd ${{ env.SERVICE_DIR }} && npm test -- --coverage
        env:
          NODE_ENV: test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-notification
          path: ${{ env.SERVICE_DIR }}/coverage/

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pharma-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build Docker image
        run: |
          cd ${{ env.SERVICE_DIR }}
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest .
      - name: Push image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  update-gitops:
    name: Update GitOps
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_reusable-update-gitops.yml
    with:
      service-name: notification-service
      ecr-repository: ${{ env.ECR_REPOSITORY }}
      image-tag: ${{ env.IMAGE_TAG }}
      gitops-repo: ${{ env.GITOPS_REPO }}
      aws-region: ${{ env.AWS_REGION }}
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
