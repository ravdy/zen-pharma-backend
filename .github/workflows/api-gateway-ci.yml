name: API Gateway CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'api-gateway/**'
      - '.github/workflows/api-gateway-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api-gateway/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: api-gateway
  IMAGE_TAG: ${{ github.sha }}
  GITOPS_REPO: ravdy/zen-gitops
  SERVICE_DIR: api-gateway

jobs:
  # ── 1. Lint (Checkstyle) ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkstyle
        run: cd ${{ env.SERVICE_DIR }} && mvn checkstyle:check --no-transfer-progress

  # ── 2. Unit Tests with Coverage ──────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with JaCoCo coverage
        run: cd ${{ env.SERVICE_DIR }} && mvn test jacoco:report --no-transfer-progress

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api-gateway
          path: ${{ env.SERVICE_DIR }}/target/site/jacoco/

  # ── 3. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: cd ${{ env.SERVICE_DIR }} && mvn package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-jar
          path: ${{ env.SERVICE_DIR }}/target/*.jar

  # ── 4. Docker Build & Push ────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v8
        with:
          name: api-gateway-jar
          path: ${{ env.SERVICE_DIR }}/target/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pharma-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          cd ${{ env.SERVICE_DIR }}
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest .

      - name: Push image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ── 5. Update GitOps Repo ────────────────────────────────────────────────
  update-gitops:
    name: Update GitOps
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_reusable-update-gitops.yml
    with:
      service-name: api-gateway
      ecr-repository: ${{ env.ECR_REPOSITORY }}
      image-tag: ${{ env.IMAGE_TAG }}
      gitops-repo: ${{ env.GITOPS_REPO }}
      aws-region: ${{ env.AWS_REGION }}
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
